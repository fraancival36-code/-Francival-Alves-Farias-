        .mercadolivre { background: #00AEEF; }

        .video-popup {

            width: 80%;
            height: 70%;
            background: #000;

            border-radius: 20px;
            z-index: 9999;
            padding: 20px;

        .close-btn { padding: 10px 20px; background: red; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* === SECRET DOOR === */
        #portaSecreta {

            border: none;
            background: transparent;
